<!DOCTYPE html>
<html>
<head>
  <title>JoJo RPG Ultimate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🌌 JoJo RPG: Ultimate Bosses 🌌</h1>

<div class="game">

  <div class="panel">
    <h2>👤 Player</h2>
    <p id="trait"></p>
    <p id="stand"></p>
    <p id="level"></p>
    <p id="stats"></p>
  </div>

  <div class="panel">
    <h2>🎒 Inventory</h2>
    <p id="inventory"></p>
    <button onclick="useArrow()">Use Arrow</button>
    <button onclick="train()">Train</button>
  </div>

  <div class="panel">
    <h2>⚔️ Combat</h2>
    <button onclick="attack()">Attack</button>
    <button onclick="ability()">Ability</button>
    <button onclick="fightBoss()">Fight Boss</button>
  </div>

</div>

<div id="notifyContainer"></div>

<script src="script.js"></script>
</body>
</html>

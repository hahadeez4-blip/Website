<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nova Luau Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚡ NOVA LUAU STUDIO ⚡</h1>

<div class="container">
  <textarea id="editor" placeholder="-- Write your Luau script here..."></textarea>

  <div class="buttons">
    <button onclick="copyScript()">Copy</button>
    <button onclick="downloadScript()">Download</button>
    <button onclick="clearEditor()">Clear</button>
    <button onclick="loadTemplate('basic')">Basic</button>
    <button onclick="loadTemplate('gui')">GUI</button>
    <button onclick="loadTemplate('tool')">Tool</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

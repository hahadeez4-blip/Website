<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nova Luau Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <h1>⚡ Loading Nova Hub...</h1>
</div>

<!-- KEY SYSTEM -->
<div id="keyScreen">
  <h2>Enter Key</h2>
  <input id="keyInput" placeholder="Enter key...">
  <button onclick="checkKey()">Submit</button>
</div>

<!-- MAIN HUB -->
<div id="hub" style="display:none;">
  <h1>⚡ NOVA LUAU HUB ⚡</h1>

  <textarea id="editor" placeholder="-- Write your Luau script..."></textarea>

  <div class="buttons">
    <button onclick="copyScript()">Copy</button>
    <button onclick="downloadScript()">Download</button>
    <button onclick="clearEditor()">Clear</button>
  </div>
</div>

<!-- NOTIFICATIONS -->
<div id="notifyContainer"></div>

<script src="script.js"></script>
</body>
</html>
